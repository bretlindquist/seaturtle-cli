name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, like v1.2.3
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: windows-latest
            target: windows-x64
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm install

      - name: Build CLI bundle
        run: node scripts/build-cli.mjs --no-minify

      - name: Build release artifact
        run: node scripts/build-release-artifact.mjs --target ${{ matrix.target }}

      - name: Smoke test macOS artifact
        if: runner.os == 'macOS'
        run: |
          tar -xzf dist/release/seaturtle-${{ matrix.target }}.tar.gz -C dist/release
          ./dist/release/ct --version

      - name: Smoke test Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Expand-Archive -Path "dist/release/seaturtle-${{ matrix.target }}.zip" -DestinationPath "dist/release/windows-smoke"
          & "dist/release/windows-smoke/ct.exe" --version

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/release/seaturtle-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    name: Publish release assets
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: release-*
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/publish-release-assets.sh ${RELEASE_TAG} dist/release
